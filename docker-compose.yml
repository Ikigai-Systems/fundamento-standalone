x-rails-environment: &rails-environment
  DATABASE_URL: postgres://postgres:password@postgresql/postgres
  REDIS_URL: redis://redis
  HTTP_HOST: ${HTTP_HOST:-localhost:3000}
  RAILS_LOG_LEVEL: ${RAILS_LOG_LEVEL:-info}

services:
  postgresql:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 10s
      retries: 3
  redis:
    image: redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 10s
      retries: 3
  website:
    image: ghcr.io/ikigai-systems/fundamento:${FUNDAMENTO_VERSION:-master}
    environment:
      <<: *rails-environment
    volumes:
      - credentials:/rails/config/credentials
      - storage:/rails/storage
    env_file:
      - env.standalone
    ports:
      - '${RAILS_PORT:-3000}:3000'
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
  jobs:
    image: ghcr.io/ikigai-systems/fundamento:${FUNDAMENTO_VERSION:-master}
    command: bundle exec good_job start
    environment:
      <<: *rails-environment
    volumes:
      - credentials:/rails/config/credentials
      - storage:/rails/storage
    env_file:
      - env.standalone
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres:
  credentials:
  storage:
